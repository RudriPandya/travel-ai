openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: AI-Powered Travel Management Platform API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: trips
    description: Trip and itinerary management
  - name: flights
    description: Flight search
  - name: hotels
    description: Hotel search
  - name: activities
    description: Activities and experiences
  - name: bookings
    description: Booking management
  - name: expenses
    description: Expense management
  - name: profile
    description: User profile and preferences
  - name: loyalty
    description: Loyalty program
  - name: corporate
    description: Corporate travel management
  - name: notifications
    description: Notifications
  - name: dashboard
    description: Dashboard data
  - name: ai
    description: AI assistant and trip planning
  - name: destinations
    description: Destination discovery

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ==================== DASHBOARD ====================
  /dashboard/stats:
    get:
      operationId: getDashboardStats
      tags: [dashboard]
      summary: Get dashboard statistics
      responses:
        "200":
          description: Dashboard stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

  /dashboard/upcoming-trips:
    get:
      operationId: getUpcomingTrips
      tags: [dashboard]
      summary: Get upcoming trips for dashboard
      responses:
        "200":
          description: Upcoming trips
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TripSummary"

  /dashboard/price-alerts:
    get:
      operationId: getPriceAlerts
      tags: [dashboard]
      summary: Get active price alerts
      responses:
        "200":
          description: Price alerts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PriceAlert"

  # ==================== TRIPS / ITINERARIES ====================
  /trips:
    get:
      operationId: listTrips
      tags: [trips]
      summary: List user trips
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [planning, upcoming, active, completed, cancelled]
        - name: limit
          in: query
          schema:
            type: integer
        - name: offset
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of trips
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Trip"
    post:
      operationId: createTrip
      tags: [trips]
      summary: Create a new trip
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTripBody"
      responses:
        "201":
          description: Created trip
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Trip"

  /trips/{id}:
    get:
      operationId: getTrip
      tags: [trips]
      summary: Get a trip by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Trip detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TripDetail"
        "404":
          description: Trip not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateTrip
      tags: [trips]
      summary: Update a trip
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTripBody"
      responses:
        "200":
          description: Updated trip
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Trip"
    delete:
      operationId: deleteTrip
      tags: [trips]
      summary: Delete a trip
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /trips/{id}/itinerary-days:
    get:
      operationId: getItineraryDays
      tags: [trips]
      summary: Get itinerary days for a trip
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Itinerary days
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ItineraryDay"

  /trips/{id}/activities:
    post:
      operationId: addActivityToTrip
      tags: [trips]
      summary: Add an activity to a trip
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddActivityBody"
      responses:
        "201":
          description: Added activity
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Activity"

  /trips/{id}/optimize:
    post:
      operationId: optimizeTrip
      tags: [trips]
      summary: Run AI optimization on trip itinerary
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OptimizeTripBody"
      responses:
        "200":
          description: Optimization result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OptimizationResult"

  # ==================== AI PLANNING ====================
  /ai/plan-trip:
    post:
      operationId: aiPlanTrip
      tags: [ai]
      summary: Generate AI trip itinerary from natural language
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AiPlanTripBody"
      responses:
        "200":
          description: Generated itinerary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiGeneratedItinerary"

  /ai/chat:
    post:
      operationId: aiChat
      tags: [ai]
      summary: Send message to AI travel assistant
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AiChatBody"
      responses:
        "200":
          description: AI response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiChatResponse"

  /ai/chat/history:
    get:
      operationId: getChatHistory
      tags: [ai]
      summary: Get AI chat conversation history
      responses:
        "200":
          description: Chat history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ChatMessage"

  # ==================== FLIGHT SEARCH ====================
  /flights/search:
    get:
      operationId: searchFlights
      tags: [flights]
      summary: Search for flights
      parameters:
        - name: origin
          in: query
          required: true
          schema:
            type: string
        - name: destination
          in: query
          required: true
          schema:
            type: string
        - name: departureDate
          in: query
          required: true
          schema:
            type: string
        - name: returnDate
          in: query
          schema:
            type: string
        - name: passengers
          in: query
          schema:
            type: integer
        - name: cabinClass
          in: query
          schema:
            type: string
            enum: [economy, premium_economy, business, first]
        - name: maxPrice
          in: query
          schema:
            type: number
        - name: stops
          in: query
          schema:
            type: string
            enum: [any, nonstop, one_stop]
      responses:
        "200":
          description: Flight search results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FlightSearchResults"

  /flights/price-calendar:
    get:
      operationId: getFlightPriceCalendar
      tags: [flights]
      summary: Get price calendar for a route
      parameters:
        - name: origin
          in: query
          required: true
          schema:
            type: string
        - name: destination
          in: query
          required: true
          schema:
            type: string
        - name: month
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Price calendar
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PriceCalendarEntry"

  # ==================== HOTEL SEARCH ====================
  /hotels/search:
    get:
      operationId: searchHotels
      tags: [hotels]
      summary: Search for hotels
      parameters:
        - name: destination
          in: query
          required: true
          schema:
            type: string
        - name: checkIn
          in: query
          required: true
          schema:
            type: string
        - name: checkOut
          in: query
          required: true
          schema:
            type: string
        - name: guests
          in: query
          schema:
            type: integer
        - name: minStars
          in: query
          schema:
            type: integer
        - name: maxPrice
          in: query
          schema:
            type: number
        - name: amenities
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Hotel search results
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Hotel"

  /hotels/{id}:
    get:
      operationId: getHotel
      tags: [hotels]
      summary: Get hotel details
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Hotel detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HotelDetail"

  # ==================== ACTIVITIES ====================
  /activities/search:
    get:
      operationId: searchActivities
      tags: [activities]
      summary: Search activities and experiences
      parameters:
        - name: destination
          in: query
          required: true
          schema:
            type: string
        - name: category
          in: query
          schema:
            type: string
            enum: [adventure, culture, food, family, wellness, tours, nightlife, sports]
        - name: maxPrice
          in: query
          schema:
            type: number
        - name: date
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Activity search results
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityListing"

  /activities/recommendations:
    get:
      operationId: getActivityRecommendations
      tags: [activities]
      summary: Get personalized activity recommendations
      parameters:
        - name: destination
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Recommendations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityListing"

  # ==================== DESTINATIONS ====================
  /destinations/popular:
    get:
      operationId: getPopularDestinations
      tags: [destinations]
      summary: Get popular destinations
      responses:
        "200":
          description: Popular destinations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Destination"

  /destinations/recommended:
    get:
      operationId: getRecommendedDestinations
      tags: [destinations]
      summary: Get personalized destination recommendations
      responses:
        "200":
          description: Recommended destinations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Destination"

  /destinations/{slug}:
    get:
      operationId: getDestination
      tags: [destinations]
      summary: Get destination details
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Destination detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DestinationDetail"

  # ==================== BOOKINGS ====================
  /bookings:
    get:
      operationId: listBookings
      tags: [bookings]
      summary: List user bookings
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [confirmed, pending, cancelled, completed]
        - name: type
          in: query
          schema:
            type: string
            enum: [flight, hotel, activity, car_rental, package]
      responses:
        "200":
          description: List of bookings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Booking"
    post:
      operationId: createBooking
      tags: [bookings]
      summary: Create a booking
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBookingBody"
      responses:
        "201":
          description: Created booking
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Booking"

  /bookings/{id}:
    get:
      operationId: getBooking
      tags: [bookings]
      summary: Get booking detail
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Booking detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BookingDetail"
    patch:
      operationId: updateBooking
      tags: [bookings]
      summary: Update booking (modify)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateBookingBody"
      responses:
        "200":
          description: Updated booking
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Booking"

  /bookings/{id}/cancel:
    post:
      operationId: cancelBooking
      tags: [bookings]
      summary: Cancel a booking
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CancelBookingBody"
      responses:
        "200":
          description: Cancellation result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CancellationResult"

  # ==================== EXPENSES ====================
  /expenses:
    get:
      operationId: listExpenses
      tags: [expenses]
      summary: List expenses
      parameters:
        - name: tripId
          in: query
          schema:
            type: integer
        - name: category
          in: query
          schema:
            type: string
        - name: reportId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of expenses
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Expense"
    post:
      operationId: createExpense
      tags: [expenses]
      summary: Create an expense
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateExpenseBody"
      responses:
        "201":
          description: Created expense
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Expense"

  /expenses/{id}:
    patch:
      operationId: updateExpense
      tags: [expenses]
      summary: Update an expense
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateExpenseBody"
      responses:
        "200":
          description: Updated expense
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Expense"
    delete:
      operationId: deleteExpense
      tags: [expenses]
      summary: Delete an expense
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /expenses/reports:
    get:
      operationId: listExpenseReports
      tags: [expenses]
      summary: List expense reports
      responses:
        "200":
          description: List of expense reports
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ExpenseReport"
    post:
      operationId: createExpenseReport
      tags: [expenses]
      summary: Create an expense report
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateExpenseReportBody"
      responses:
        "201":
          description: Created report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExpenseReport"

  /expenses/summary:
    get:
      operationId: getExpenseSummary
      tags: [expenses]
      summary: Get expense summary by category
      parameters:
        - name: tripId
          in: query
          schema:
            type: integer
        - name: period
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Expense summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExpenseSummary"

  # ==================== PROFILE ====================
  /profile:
    get:
      operationId: getProfile
      tags: [profile]
      summary: Get current user profile
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
    patch:
      operationId: updateProfile
      tags: [profile]
      summary: Update user profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProfileBody"
      responses:
        "200":
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"

  /profile/documents:
    get:
      operationId: listDocuments
      tags: [profile]
      summary: List travel documents
      responses:
        "200":
          description: Travel documents
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TravelDocument"
    post:
      operationId: createDocument
      tags: [profile]
      summary: Add a travel document
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDocumentBody"
      responses:
        "201":
          description: Created document
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TravelDocument"

  /profile/loyalty-programs:
    get:
      operationId: listLoyaltyPrograms
      tags: [profile]
      summary: List saved loyalty programs
      responses:
        "200":
          description: Loyalty programs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SavedLoyaltyProgram"
    post:
      operationId: addLoyaltyProgram
      tags: [profile]
      summary: Add a loyalty program
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddLoyaltyProgramBody"
      responses:
        "201":
          description: Added loyalty program
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SavedLoyaltyProgram"

  # ==================== LOYALTY ====================
  /loyalty/account:
    get:
      operationId: getLoyaltyAccount
      tags: [loyalty]
      summary: Get loyalty account status
      responses:
        "200":
          description: Loyalty account
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoyaltyAccount"

  /loyalty/transactions:
    get:
      operationId: listLoyaltyTransactions
      tags: [loyalty]
      summary: List points transactions
      responses:
        "200":
          description: Points transactions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LoyaltyTransaction"

  /loyalty/rewards:
    get:
      operationId: listRewards
      tags: [loyalty]
      summary: List available rewards for redemption
      responses:
        "200":
          description: Available rewards
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Reward"

  # ==================== PRICE ALERTS ====================
  /price-alerts:
    get:
      operationId: listPriceAlerts
      tags: [trips]
      summary: List price alerts
      responses:
        "200":
          description: Price alerts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PriceAlert"
    post:
      operationId: createPriceAlert
      tags: [trips]
      summary: Create a price alert
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePriceAlertBody"
      responses:
        "201":
          description: Created price alert
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PriceAlert"

  /price-alerts/{id}:
    delete:
      operationId: deletePriceAlert
      tags: [trips]
      summary: Delete a price alert
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ==================== CORPORATE ====================
  /corporate/overview:
    get:
      operationId: getCorporateOverview
      tags: [corporate]
      summary: Get corporate travel overview stats
      responses:
        "200":
          description: Corporate overview
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CorporateOverview"

  /corporate/travelers:
    get:
      operationId: listCorporateTravelers
      tags: [corporate]
      summary: List corporate travelers
      responses:
        "200":
          description: Corporate travelers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CorporateTraveler"

  /corporate/approvals:
    get:
      operationId: listApprovals
      tags: [corporate]
      summary: List pending approvals
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, approved, rejected]
      responses:
        "200":
          description: Approvals list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Approval"

  /corporate/approvals/{id}/approve:
    post:
      operationId: approveRequest
      tags: [corporate]
      summary: Approve a travel request
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Approved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Approval"

  /corporate/approvals/{id}/reject:
    post:
      operationId: rejectRequest
      tags: [corporate]
      summary: Reject a travel request
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RejectRequestBody"
      responses:
        "200":
          description: Rejected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Approval"

  /corporate/policy:
    get:
      operationId: getTravelPolicy
      tags: [corporate]
      summary: Get company travel policy
      responses:
        "200":
          description: Travel policy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TravelPolicy"
    patch:
      operationId: updateTravelPolicy
      tags: [corporate]
      summary: Update company travel policy
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTravelPolicyBody"
      responses:
        "200":
          description: Updated policy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TravelPolicy"

  /corporate/spend-report:
    get:
      operationId: getCorporateSpendReport
      tags: [corporate]
      summary: Get corporate spend analytics
      parameters:
        - name: period
          in: query
          schema:
            type: string
        - name: groupBy
          in: query
          schema:
            type: string
            enum: [department, traveler, destination, category]
      responses:
        "200":
          description: Spend report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SpendReport"

  # ==================== NOTIFICATIONS ====================
  /notifications:
    get:
      operationId: listNotifications
      tags: [notifications]
      summary: List notifications
      parameters:
        - name: unreadOnly
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: Notifications
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Notification"

  /notifications/{id}/read:
    post:
      operationId: markNotificationRead
      tags: [notifications]
      summary: Mark notification as read
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Marked as read
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Notification"

  /notifications/read-all:
    post:
      operationId: markAllNotificationsRead
      tags: [notifications]
      summary: Mark all notifications as read
      responses:
        "200":
          description: All marked as read
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

