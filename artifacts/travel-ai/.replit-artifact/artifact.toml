kind = "web"
previewPath = "/"
title = "AI Travel Platform"
version = "1.0.0"
id = "artifacts/travel-ai"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24678

[services.development]
run = "pnpm --filter @workspace/travel-ai run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/travel-ai", "run", "build" ]
publicDir = "artifacts/travel-ai/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24678"
BASE_PATH = "/"
